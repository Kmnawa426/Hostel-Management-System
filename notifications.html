<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | Hostel Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="notification-engine.js"></script>
  <link rel="stylesheet" href="theme.css">
  <style>
    :root {
      --notif-bg: #f3f6fb;
      --notif-panel: #ffffff;
      --notif-ink: #0f172a;
      --notif-muted: #64748b;
      --notif-line: #e2e8f0;
      --notif-brand: #2f6fe4;
      --notif-high: #991b1b;
      --notif-medium: #9a3412;
      --notif-low: #065f46;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--notif-ink);
    }

    .wrap {
      max-width: 1200px;
      padding: 0 18px;
    }

    .summary {
      background: var(--notif-panel);
      border: 1px solid var(--notif-line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .summary-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar button,
    .actions button,
    .modal-actions button,
    .modal-close {
      border: none;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-primary {
      background: var(--notif-brand);
      color: #fff;
    }

    .btn-muted {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    .btn-secondary {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .panel {
      background: var(--notif-panel);
      border: 1px solid var(--notif-line);
      border-radius: 14px;
      overflow: hidden;
      min-height: 320px;
    }

    .list {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .notif {
      border: 1px solid var(--notif-line);
      border-radius: 12px;
      background: #fff;
      transition: 0.2s ease;
    }

    .notif.unread {
      border-left: 4px solid var(--notif-brand);
      background: #fbfdff;
    }

    .notif.high {
      box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.2);
    }

    .notif-head {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .title-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
    }

    .meta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--notif-muted);
    }

    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .chip.type {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .chip.high {
      background: #fee2e2;
      color: var(--notif-high);
      border-color: #fecaca;
    }

    .chip.medium {
      background: #ffedd5;
      color: var(--notif-medium);
      border-color: #fed7aa;
    }

    .chip.low {
      background: #dcfce7;
      color: var(--notif-low);
      border-color: #bbf7d0;
    }

    .chip.read {
      background: #f1f5f9;
      color: #334155;
      border-color: #e2e8f0;
    }

    .chip.open {
      background: #ecfeff;
      color: #155e75;
      border-color: #a5f3fc;
    }

    .details {
      padding: 0 12px 12px;
      border-top: 1px solid var(--notif-line);
      background: #fcfdff;
    }

    .details .message {
      margin: 0 0 10px;
      color: #334155;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      text-align: center;
      color: var(--notif-muted);
      padding: 40px 16px;
      font-weight: 600;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(3px);
      z-index: 9999;
      padding: 16px;
    }

    .modal-box {
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      width: 420px;
      max-width: 95vw;
      border-radius: 18px;
      border: 1px solid #d9e3f0;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.25);
      overflow: hidden;
      animation: modalPop 0.2s ease;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #e3ebf4;
      background: #f4f8ff;
    }

    .modal-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-icon {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 16px;
      font-weight: 800;
    }

    .modal-title {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      color: #0f172a;
    }

    .modal-subtitle {
      margin: 2px 0 0;
      font-size: 12px;
      color: #64748b;
    }

    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid #dbe2ea;
      background: #fff;
      color: #334155;
      cursor: pointer;
      padding: 0;
      font-size: 17px;
      line-height: 1;
    }

    .modal-content {
      padding: 16px;
    }

    .modal-box p {
      margin: 0;
      color: #475569;
      line-height: 1.45;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      border-top: 1px solid #e3ebf4;
      padding: 12px 16px 16px;
      background: #f8fbff;
    }

    .modal-actions button {
      min-width: 95px;
    }

    @keyframes modalPop {
      from {
        transform: translateY(8px) scale(0.98);
        opacity: 0.75;
      }

      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 980px) {
      .summary-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="summary">
      <div>
        <strong id="summaryUnread">0 unread</strong>
        <div id="summaryTotal" style="margin-top: 4px; color: var(--notif-muted); font-size: 14px;">0 notifications total</div>
      </div>
      <div class="summary-actions">
        <button class="btn-muted" onclick="markAllRead()">Mark All Read</button>
        <button class="btn-danger" onclick="deleteAll()">Delete All</button>
      </div>
    </div>

    <div class="panel">
      <div class="list" id="notifList"></div>
    </div>
  </div>

  <div class="modal" id="confirmModal" onclick="if(event.target===this) closeConfirm()">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-title-wrap">
          <span class="modal-icon">!</span>
          <div>
            <h3 class="modal-title">Confirm Action</h3>
            <p class="modal-subtitle">Please review before continuing</p>
          </div>
        </div>
        <button class="modal-close" type="button" aria-label="Close" onclick="closeConfirm()">&times;</button>
      </div>
      <div class="modal-content">
        <p id="confirmText"></p>
      </div>
      <div class="modal-actions">
        <button class="btn-muted" onclick="closeConfirm()">Cancel</button>
        <button class="btn-danger" id="confirmYes">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = window.getSupabaseClient();

    let allNotifications = [];
    let confirmCallback = null;
    let openNotificationId = null;

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDateTime(value) {
      if (!value) return "-";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString();
    }

    function typeLabel(type) {
      if (type === "long_absence") return "Long Absence";
      if (type === "installment") return "Installment";
      return type || "General";
    }

    function renderSummary() {
      const total = allNotifications.length;
      const unread = allNotifications.filter(n => !n.is_read).length;
      document.getElementById("summaryUnread").innerText = `${unread} unread`;
      document.getElementById("summaryTotal").innerText = `${total} notification${total === 1 ? "" : "s"} total`;
    }

    function renderNotifications() {
      const container = document.getElementById("notifList");
      container.innerHTML = "";

      if (!allNotifications.length) {
        container.innerHTML = '<div class="empty">No notifications yet.</div>';
        return;
      }

      for (const n of allNotifications) {
        const priority = String(n.priority || "low").toLowerCase();
        const redirectButton = notificationRedirectButton(n);
        const isOpen = String(openNotificationId) === String(n.id);

        container.innerHTML += `
          <div class="notif ${!n.is_read ? "unread" : ""} ${priority === "high" ? "high" : ""}" data-id="${esc(n.id)}">
            <div class="notif-head" onclick="toggleNotification('${esc(n.id)}')">
              <div>
                <div class="title-row">
                  <div class="title">${esc(n.title || "Notification")}</div>
                </div>
                <div class="meta">Created: ${esc(formatDateTime(n.created_at))}</div>
              </div>
              <div class="chips">
                <span class="chip type">${esc(typeLabel(n.type))}</span>
                <span class="chip ${n.is_read ? "read" : "open"}">${n.is_read ? "Read" : "Unread"}</span>
              </div>
            </div>

            <div class="details" style="display:${isOpen ? "block" : "none"};">
              <p class="message">${esc(n.message || "-")}</p>
              <div class="actions">
                ${redirectButton}
                ${!n.is_read ? `<button class="btn-muted" onclick="markRead('${esc(n.id)}')">Mark Read</button>` : ""}
                <button class="btn-danger" onclick="deleteOne('${esc(n.id)}')">Delete</button>
              </div>
            </div>
          </div>
        `;
      }
    }

    function toggleNotification(notificationId) {
      openNotificationId = String(openNotificationId) === String(notificationId)
        ? null
        : notificationId;
      renderNotifications();
    }

    function notificationRedirectButton(notification) {
      if (notification.type === "long_absence") {
        return `<button class="btn-secondary" onclick="goToAttendance('${esc(notification.id)}')">Open Attendance</button>`;
      }
      if (notification.type === "installment") {
        return `<button class="btn-primary" onclick="goToInstallments('${esc(notification.id)}')">Open Installments</button>`;
      }
      return "";
    }

    async function goToInstallments(notificationId) {
      const notification = allNotifications.find(n => String(n.id) === String(notificationId));
      const search = String(notification?.students?.name || "").trim();
      await markRead(notificationId, false);
      if (!search) {
        window.location.href = "installments.html";
        return;
      }
      window.location.href = `installments.html?search=${encodeURIComponent(search)}`;
    }

    async function goToAttendance(notificationId) {
      const notification = allNotifications.find(n => String(n.id) === String(notificationId));
      const search = String(notification?.students?.name || "").trim();
      const params = new URLSearchParams();
      params.set("status", "absent");
      if (search) params.set("search", search);
      await markRead(notificationId, false);
      window.location.href = `attendance.html?${params.toString()}`;
    }

    function showConfirm(message, callback) {
      document.getElementById("confirmText").innerText = message;
      confirmCallback = callback;
      document.getElementById("confirmModal").style.display = "flex";
    }

    function closeConfirm() {
      document.getElementById("confirmModal").style.display = "none";
      confirmCallback = null;
    }

    document.getElementById("confirmYes").onclick = function () {
      if (confirmCallback) confirmCallback();
      closeConfirm();
    };

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      const modal = document.getElementById("confirmModal");
      if (modal.style.display === "flex") {
        closeConfirm();
      }
    });

    async function loadNotifications() {
      await HostelNotifications.syncLongAbsenceAlerts();

      const { data, error } = await supabaseClient
        .from("notifications")
        .select(`
          *,
          students(name)
        `)
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      allNotifications = data || [];
      renderSummary();
      renderNotifications();
      await HostelNotifications.getOpenNotificationCount();
    }

    async function markRead(id, shouldReload = true) {
      await supabaseClient
        .from("notifications")
        .update({ is_read: true })
        .eq("id", id);
      if (shouldReload) {
        await loadNotifications();
      }
    }

    async function markAllRead() {
      const unreadCount = allNotifications.filter((notification) => !notification.is_read).length;
      if (unreadCount === 0) return;

      showConfirm(`Mark ${unreadCount} notification${unreadCount === 1 ? "" : "s"} as read?`, async () => {
        await supabaseClient
          .from("notifications")
          .update({ is_read: true })
          .eq("is_read", false);
        await loadNotifications();
      });
    }

    async function deleteOne(id) {
      showConfirm("Delete this notification permanently?", async () => {
        await supabaseClient
          .from("notifications")
          .delete()
          .eq("id", id);
        await loadNotifications();
      });
    }

    async function deleteAll() {
      if (allNotifications.length === 0) return;
      const ids = allNotifications.map((notification) => notification.id).filter(Boolean);
      if (ids.length === 0) return;
      showConfirm(`Delete ${ids.length} notification${ids.length === 1 ? "" : "s"}?`, async () => {
        await supabaseClient
          .from("notifications")
          .delete()
          .in("id", ids);
        await loadNotifications();
      });
    }

    loadNotifications();
  </script>
  <script src="ui-shortcuts.js"></script>
  <script src="app-layout.js"></script>
</body>

</html>
