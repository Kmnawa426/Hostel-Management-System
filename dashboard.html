<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hostel Management</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Topbar */
        .topbar {
            background: #111827;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            width: 300px;
        }

        .notification-icon {
            font-size: 22px;
            cursor: pointer;
            position: relative;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -8px;
            background: red;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            display: none;
        }

        /* Cards */
        .dashboard-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.05);
        }

        .dashboard-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        .dashboard-icon {
            font-size: 40px;
            margin-bottom: 15px;
            color: #4f46e5;
        }

        .dashboard-title {
            font-weight: 600;
            font-size: 18px;
        }

        /* Fade animation */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
  <link rel="stylesheet" href="theme.css">
</head>

<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <h4 class="mb-0">Hostel Management System</h4>

        <div class="d-flex align-items-center gap-3">

            <input type="text" class="form-control search-box" placeholder="Search...">

            <div class="notification-icon" onclick="location.href='notifications.html'">
                <i class="bi bi-bell"></i>
                <span class="notification-badge" data-notif-badge></span>
            </div>

        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container mt-5">

        <div class="row g-4">

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='add-student.html'">
                    <div class="dashboard-icon"><i class="bi bi-person-plus"></i></div>
                    <div class="dashboard-title">Add Student</div>
                </div>
            </div>

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='students.html'">
                    <div class="dashboard-icon"><i class="bi bi-people"></i></div>
                    <div class="dashboard-title">Student List</div>
                </div>
            </div>

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='rooms.html'">
                    <div class="dashboard-icon"><i class="bi bi-building"></i></div>
                    <div class="dashboard-title">Room List</div>
                </div>
            </div>

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='complaints.html'">
                    <div class="dashboard-icon"><i class="bi bi-exclamation-circle"></i></div>
                    <div class="dashboard-title">Complaints</div>
                </div>
            </div>

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='attendance.html'">
                    <div class="dashboard-icon"><i class="bi bi-check2-square"></i></div>
                    <div class="dashboard-title">Present / Absent</div>
                </div>
            </div>

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='installments.html'">
                    <div class="dashboard-icon"><i class="bi bi-cash-stack"></i></div>
                    <div class="dashboard-title">Installments</div>
                </div>
            </div>

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='transactions.html'">
                    <div class="dashboard-icon"><i class="bi bi-receipt"></i></div>
                    <div class="dashboard-title">Transactions</div>
                </div>
            </div>

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='manage-students.html'">
                    <div class="dashboard-icon">
                        <i class="bi bi-person-gear"></i>
                    </div>
                    <div class="dashboard-title">Manage Students</div>
                </div>
            </div>

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='college.html'">
                    <div class="dashboard-icon"><i class="bi bi-megaphone"></i></div>
                    <div class="dashboard-title">College Promotion</div>
                </div>
            </div>

            <div class="col-md-3 fade-in">
                <div class="dashboard-card" onclick="location.href='events.html'">
                    <div class="dashboard-icon"><i class="bi bi-images"></i></div>
                    <div class="dashboard-title">Hostel Events</div>
                </div>
            </div>


        </div>

    </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="notification-engine.js"></script>
  <script>
    HostelNotifications.refreshNotificationBadges();
  </script>
  <script src="ui-shortcuts.js"></script>
  <script src="app-layout.js"></script>
</body>

</html>
