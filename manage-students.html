<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 14px;
        }

    </style>
  <link rel="stylesheet" href="theme.css">
</head>

<body>

    <div class="container-fluid py-4">
    <div class="card p-3">
        <div class="card p-3 mb-3">

            <div class="row g-2">

                <div class="col-md-4">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search Name / HST">
                </div>

                <select id="sortSelect" class="form-select">
                    <option value="">Sort By</option>
                    <option value="name">Name A-Z</option>
                    <option value="class">Class</option>
                </select>

                <div class="col-md-4">
                    <select id="genderFilter" class="form-select">
                        <option value="">Filter Gender</option>
                        <option value="Male">Show Male Only</option>
                        <option value="Female">Show Female Only</option>
                    </select>
                </div>

            </div>

        </div>

        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>HST</th>
                    <th>Phone</th>
                    <th>Class</th> <!-- ADD THIS -->
                    <th>Gender</th>
                    <th>Room</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="studentTable"></tbody>

        </table>

        <div class="app-pagination">
            <div id="pageInfo" class="app-pagination-info">Page 1 of 1</div>
            <div class="app-pagination-actions">
                <button class="btn btn-light btn-sm" id="prevPageBtn" type="button">Previous</button>
                <button class="btn btn-light btn-sm" id="nextPageBtn" type="button">Next</button>
            </div>
        </div>

    </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal fade" id="editModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5>Edit Student</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="editId">

                    <div class="mb-2">
                        <label>Name</label>
                        <input type="text" id="editName" class="form-control">
                    </div>

                    <div class="mb-2">
                        <label>Phone</label>
                        <input type="text" id="editPhone" class="form-control">
                    </div>

                    <div class="mb-2">
                        <label>Class</label>
                        <input type="text" id="editClass" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label>Gender</label>
                        <select id="editGender" class="form-control">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="updateStudent()">Save</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        let allStudents = [];
        let currentPage = 1;
        const pageSize = 12;

        let supabaseClient;

        window.addEventListener("DOMContentLoaded", () => {

            supabaseClient = window.getSupabaseClient();

            loadStudents();

        });

        async function loadStudents() {

            const { data } = await supabaseClient
                .from("students")
                .select(`*, rooms(room_number)`);

            allStudents = data || [];

            renderStudents();

        }
        function getFilteredStudents() {

            let list = [...allStudents];

            const search = document.getElementById("searchInput").value.toLowerCase();
            const sort = document.getElementById("sortSelect").value;
            const genderFilter = document.getElementById("genderFilter").value;

            /* SEARCH */
            if (search) {
                list = list.filter(s =>
                    (s.name || "").toLowerCase().includes(search) ||
                    String(s.hst_number || "").includes(search)
                );
            }
            /* GENDER FILTER */
            if (genderFilter) {
                list = list.filter(s => s.gender === genderFilter);
            }

            /* SORT */
            if (sort === "name") {
                list.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
            }

            if (sort === "class") {
                list.sort((a, b) => (a.class || "").localeCompare(b.class || "", undefined, { sensitivity: 'base' }));
            }

            return list;
        }

        function renderStudents() {
            const list = getFilteredStudents();

            const totalItems = list.length;
            const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const start = (currentPage - 1) * pageSize;
            const pageItems = list.slice(start, start + pageSize);

            /* RENDER */
            let html = "";

            pageItems.forEach(s => {

                html += `
<tr>
<td>${s.name || ""}</td>
<td>${s.hst_number || ""}</td>

<td>${s.student_phone || ""}</td>
<td>${s.class || "-"}</td>
<td>${s.gender || "-"}</td>
<td>${s.rooms?.room_number || "-"}</td>

<td>
<button class="btn btn-warning btn-sm"
onclick="openEdit('${s.id}')">
Edit
</button>

<button class="btn btn-danger btn-sm"
onclick="openDelete('${s.id}')">
Delete
</button>
</td>

</tr>
`;

            });

            document.getElementById("studentTable").innerHTML = html;
            document.getElementById("pageInfo").innerText = `Page ${currentPage} of ${totalPages} (${totalItems} students)`;
            document.getElementById("prevPageBtn").disabled = currentPage <= 1;
            document.getElementById("nextPageBtn").disabled = currentPage >= totalPages;

        }
        document.getElementById("searchInput").addEventListener("input", () => {
            currentPage = 1;
            renderStudents();
        });
        document.getElementById("sortSelect").addEventListener("change", () => {
            currentPage = 1;
            renderStudents();
        });
        document.getElementById("genderFilter").addEventListener("change", () => {
            currentPage = 1;
            renderStudents();
        });
        document.getElementById("prevPageBtn").addEventListener("click", () => {
            currentPage -= 1;
            renderStudents();
        });
        document.getElementById("nextPageBtn").addEventListener("click", () => {
            currentPage += 1;
            renderStudents();
        });
        async function openEdit(id) {

            const { data, error } = await supabaseClient
                .from("students")
                .select("*")
                .eq("id", id)
                .single();

            if (error || !data) {
                alert("Unable to load student");
                return;
            }

            document.getElementById("editId").value = data.id;
            document.getElementById("editName").value = data.name || "";
            document.getElementById("editPhone").value = data.student_phone || "";
            document.getElementById("editClass").value = data.class || "";
            document.getElementById("editGender").value = data.gender || "";

            new bootstrap.Modal(document.getElementById('editModal')).show();

        }

        async function updateStudent() {

            const id = document.getElementById("editId").value;

            const { error } = await supabaseClient
                .from("students")
                .update({
                    name: document.getElementById("editName").value,
                    student_phone: document.getElementById("editPhone").value,
                    class: document.getElementById("editClass").value,
                    gender: document.getElementById("editGender").value
                })
                .eq("id", id);

            if (error) {
                alert("Update failed");
                return;
            }

            bootstrap.Modal.getInstance(
                document.getElementById('editModal')
            ).hide();

            loadStudents();

        }

        async function deleteStudent(id) {

            if (!confirm("Delete this student?")) return;

            await supabaseClient
                .from("students")
                .delete()
                .eq("id", id);

            location.reload();

        }

        function openDelete(id) {
            document.getElementById("deleteId").value = id;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }
        async function confirmDelete() {

            const password = document.getElementById("deletePassword").value;

            if (!password) {
                alert("Enter password");
                return;
            }

            // get logged user
            const { data: sessionData } = await supabaseClient.auth.getSession();

            if (!sessionData.session) {
                alert("Session expired. Login again.");
                return;
            }

            const email = sessionData.session.user.email;

            // re-authenticate
            const { error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                alert("Wrong password");
                return;
            }

            // delete student
            const id = document.getElementById("deleteId").value;

            await supabaseClient
                .from("students")
                .delete()
                .eq("id", id);

            location.reload();

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DELETE PASSWORD MODAL -->
    <div class="modal fade" id="deleteModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5>Confirm Delete</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="deleteId">

                    <label>Enter Admin Password</label>
                    <input type="password" id="deletePassword" class="form-control">

                </div>

                <div class="modal-footer">
                    <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
                </div>

            </div>
        </div>
    </div>
  <script src="ui-shortcuts.js"></script>
  <script src="app-layout.js"></script>
</body>

</html>
